<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papers Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 600;
        }

        .search-box {
            margin: 20px 0;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .papers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .paper-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .paper-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .paper-title {
            font-size: 1.2em;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .paper-authors {
            color: #666;
            font-size: 0.95em;
            margin-bottom: 10px;
        }

        .paper-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .meta-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            color: #555;
        }

        .doi-link {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .doi-link:hover {
            transform: scale(1.05);
        }

        .abstract {
            color: #555;
            font-size: 0.9em;
            line-height: 1.6;
            margin-top: 15px;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }

        .abstract.expanded {
            max-height: none;
        }

        .expand-btn {
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            margin-top: 5px;
            display: inline-block;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 1.5em;
        }

        .no-results {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Papers Dashboard</h1>
            <p style="color: #666; margin-top: 10px;">Bilal Drones Data References</p>
            <div class="stats">
                <div class="stat-box">
                    <span id="total-papers">0</span> Papers
                </div>
                <div class="stat-box">
                    <span id="with-doi">0</span> with DOI
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="search" placeholder="🔍 Search by title, author, year, or keywords...">
            </div>
        </header>

        <div id="loading" class="loading">Loading papers...</div>
        <div id="papers-container" class="papers-grid" style="display: none;"></div>
        <div id="no-results" class="no-results" style="display: none;">No papers found matching your search.</div>
    </div>

    <script>
        let allPapers = [];

        async function loadBibFile() {
            try {
                const response = await fetch('bilal drones data references.bib');
                const text = await response.text();
                parseBibFile(text);
            } catch (error) {
                console.error('Error loading bib file:', error);
                document.getElementById('loading').textContent = 'Error loading papers. Please make sure the .bib file is in the same directory.';
            }
        }

        function parseBibFile(text) {
            const entries = text.split('@').filter(e => e.trim());
            allPapers = [];

            entries.forEach(entry => {
                const paper = {};
                
                const typeMatch = entry.match(/^(\w+)\{([^,]+),/);
                if (typeMatch) {
                    paper.type = typeMatch[1];
                    paper.id = typeMatch[2];
                }

                const fields = {
                    title: /title\s*=\s*\{\{([^}]+)\}\}/,
                    titleAlt: /title\s*=\s*\{([^}]+)\}/,
                    author: /author\s*=\s*\{([^}]+)\}/,
                    year: /year\s*=\s*\{([^}]+)\}/,
                    doi: /doi\s*=\s*\{([^}]+)\}/,
                    journal: /journal\s*=\s*\{([^}]+)\}/,
                    abstract: /abstract\s*=\s*\{([^}]+)\}/,
                    keywords: /keywords\s*=\s*\{([^}]+)\}/,
                    volume: /volume\s*=\s*\{([^}]+)\}/,
                    number: /number\s*=\s*\{([^}]+)\}/,
                    pages: /pages\s*=\s*\{([^}]+)\}/
                };

                for (const [key, regex] of Object.entries(fields)) {
                    const match = entry.match(regex);
                    if (match) {
                        paper[key === 'titleAlt' ? 'title' : key] = match[1].trim();
                    }
                }

                if (paper.title) {
                    allPapers.push(paper);
                }
            });

            displayPapers(allPapers);
            updateStats();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('papers-container').style.display = 'grid';
        }

        function displayPapers(papers) {
            const container = document.getElementById('papers-container');
            
            if (papers.length === 0) {
                container.style.display = 'none';
                document.getElementById('no-results').style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            document.getElementById('no-results').style.display = 'none';
            
            container.innerHTML = papers.map((paper, index) => `
                <div class="paper-card">
                    <div class="paper-title">${paper.title}</div>
                    <div class="paper-authors">${paper.author || 'Unknown authors'}</div>
                    <div class="paper-meta">
                        ${paper.year ? `<span class="meta-tag">📅 ${paper.year}</span>` : ''}
                        ${paper.journal ? `<span class="meta-tag">📖 ${paper.journal}</span>` : ''}
                        ${paper.volume ? `<span class="meta-tag">Vol. ${paper.volume}</span>` : ''}
                    </div>
                    ${paper.keywords ? `<div style="margin: 10px 0; font-size: 0.85em; color: #888;">🏷️ ${paper.keywords}</div>` : ''}
                    ${paper.abstract ? `
                        <div class="abstract" id="abstract-${index}">
                            ${paper.abstract}
                        </div>
                        <span class="expand-btn" onclick="toggleAbstract(${index})">Show more</span>
                    ` : ''}
                    ${paper.doi ? `
                        <a href="https://doi.org/${paper.doi}" target="_blank" class="doi-link">
                            📄 Open Paper (DOI)
                        </a>
                    ` : '<div style="color: #999; margin-top: 10px; font-size: 0.9em;">No DOI available</div>'}
                </div>
            `).join('');
        }

        function toggleAbstract(index) {
            const abstract = document.getElementById(`abstract-${index}`);
            const btn = abstract.nextElementSibling;
            
            if (abstract.classList.contains('expanded')) {
                abstract.classList.remove('expanded');
                btn.textContent = 'Show more';
            } else {
                abstract.classList.add('expanded');
                btn.textContent = 'Show less';
            }
        }

        function updateStats() {
            document.getElementById('total-papers').textContent = allPapers.length;
            const withDoi = allPapers.filter(p => p.doi).length;
            document.getElementById('with-doi').textContent = withDoi;
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            
            if (!query) {
                displayPapers(allPapers);
                return;
            }

            const filtered = allPapers.filter(paper => {
                return (paper.title && paper.title.toLowerCase().includes(query)) ||
                       (paper.author && paper.author.toLowerCase().includes(query)) ||
                       (paper.year && paper.year.includes(query)) ||
                       (paper.keywords && paper.keywords.toLowerCase().includes(query)) ||
                       (paper.abstract && paper.abstract.toLowerCase().includes(query));
            });

            displayPapers(filtered);
        });

        loadBibFile();
    </script>
</body>
</html>
